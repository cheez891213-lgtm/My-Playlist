<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字卡抽屜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Sans+KR:wght@400;500;700;900&family=Beau+Rivage&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F5F5F3;
    --paper-dark:#E9E9E6;
    --card:#FFFFFF;
    --ink:#221F1D;
    --ink-soft:#7A736A;
    --line:#E3DDD0;
    --green:#E8899E;
    --green-dark:#D06A82;
    --green-tint:#FBEAEF;
    --rust:#D65B5B;
    --rust-tint:#F7E3E1;
    --muted:#A79F94;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter','Noto Sans TC','Noto Sans KR', sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:760px;margin:0 auto;padding:28px 20px 60px;}

  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:nowrap;gap:12px;}
  .logo-title{
    height:168px;
    width:auto;
    display:block;
  }
  .subtitle{font-size:12px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;margin-top:4px;}

  .tabs{display:flex;gap:0;border:1px solid var(--ink);border-radius:999px;overflow:hidden;background:var(--card);flex-shrink:0;}
  .tabs button{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    padding:8px 18px;
    border:none;
    background:transparent;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .tabs button.active{background:var(--ink);color:var(--paper);}

  .panel{display:none;}
  .panel.active{display:block;}

  /* ---- Manage view ---- */
  .add-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .add-btn{
    display:flex;align-items:center;justify-content:center;gap:8px;
    width:100%;
    padding:14px 16px;
    background:var(--card);
    border:1px dashed var(--muted);
    border-radius:var(--radius);
    color:var(--ink-soft);
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    cursor:pointer;
  }
  .add-btn:hover{border-color:var(--green);color:var(--green);}

  .lyrics-list{display:flex;flex-direction:column;gap:8px;max-height:340px;overflow-y:auto;margin:14px 0;}
  .lyrics-item{
    display:flex;align-items:center;gap:12px;
    background:var(--card);border:1px solid var(--line);border-radius:8px;
    padding:10px 12px;
  }
  .lyrics-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--green);flex-shrink:0;}
  .lyrics-item .lw{font-weight:700;min-width:110px;}
  .lyrics-item .lt{color:var(--ink-soft);font-size:13px;flex:1;}
  .lyrics-item .lt.pending{color:var(--muted);font-style:italic;}
  .lyrics-status{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);margin:10px 0;}

  /* ---- Library (word-collection grid) ---- */
  .lib-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .lib-header-title{font-family:'Inter','Noto Sans TC','Noto Sans KR',sans-serif;font-weight:700;font-size:20px;}
  .icon-add-btn{
    width:34px;height:34px;border-radius:50%;
    border:none;background:var(--card);color:var(--ink);
    font-size:20px;line-height:1;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .icon-add-btn:hover{background:var(--paper-dark);}
  .lib-header-actions{display:flex;align-items:center;gap:8px;}
  .lib-delete-badge{
    position:absolute;top:6px;right:6px;
    width:24px;height:24px;border-radius:50%;
    background:var(--rust);color:#FFFFFF;
    border:none;display:none;
    align-items:center;justify-content:center;
    font-size:14px;line-height:1;cursor:pointer;z-index:3;
  }
  .lib-edit-cover-badge{
    position:absolute;top:6px;left:6px;
    width:24px;height:24px;border-radius:50%;
    background:var(--card);color:var(--ink);
    border:1px solid var(--line);display:none;
    align-items:center;justify-content:center;
    font-size:12px;line-height:1;cursor:pointer;z-index:3;
  }
  .lib-grid.delete-mode .lib-delete-badge{display:flex;}
  .lib-grid.delete-mode .lib-edit-cover-badge{display:flex;}
  .lib-grid.delete-mode .lib-cover{opacity:0.85;}
  .lib-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .lib-card{cursor:pointer;position:relative;}
  .lib-cover{
    width:100%;aspect-ratio:1/1;border-radius:14px;
    background:#FFFFFF;
    border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  .lib-cover img{width:100%;height:100%;object-fit:cover;}
  .cover-fallback{width:38%;height:38%;color:var(--green-tint);}
  .cover-fallback path{fill:#F3B8C6;}
  .lib-title{margin-top:8px;font-size:13px;font-weight:600;color:var(--ink);line-height:1.3;}
  .lib-meta{font-size:11px;color:var(--ink-soft);margin-top:2px;font-family:'IBM Plex Mono',monospace;}

  /* ---- Album detail (track-list style word list) ---- */
  .back-btn{background:none;border:none;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;font-size:13px;cursor:pointer;padding:0 0 12px;}
  .back-btn:hover{color:var(--ink);}
  .album-detail-header{display:flex;align-items:center;gap:14px;margin-bottom:6px;}
  .album-cover{width:64px;height:64px;border-radius:14px;background:#FFFFFF;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
  .album-cover img{width:100%;height:100%;object-fit:cover;}
  .album-cover .cover-fallback{width:40%;height:40%;}
  .album-detail-title{font-family:'Inter','Noto Sans TC','Noto Sans KR',sans-serif;font-weight:900;font-size:20px;}
  .album-detail-meta{font-size:12px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;margin-top:2px;}
  .word-list{display:flex;flex-direction:column;margin-top:10px;}
  .word-row{display:flex;align-items:center;gap:12px;padding:10px 4px;border-bottom:1px solid var(--line);touch-action:pan-y;}
  .word-row.dragging{
    position:relative;z-index:5;background:var(--card);
    box-shadow:0 4px 14px rgba(0,0,0,0.12);
    border-radius:8px;opacity:0.95;
  }
  .word-thumb{
    width:52px;height:52px;border-radius:12px;flex-shrink:0;
    background:#FFFFFF;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;overflow:hidden;
  }
  .word-thumb img{width:100%;height:100%;object-fit:cover;}
  .word-thumb .cover-fallback{width:44%;height:44%;}
  .word-row .wtext{flex:1;min-width:0;}
  .word-row .wf{font-family:'Inter','Noto Sans TC','Noto Sans KR',sans-serif;font-weight:600;font-size:15px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .word-row .wb{font-family:'Noto Sans TC','Noto Sans KR',sans-serif;font-size:12px;color:var(--ink-soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .word-row .wactions{display:flex;gap:6px;flex-shrink:0;}
  .word-row .wactions button{font-family:'IBM Plex Mono',monospace;font-size:11px;border:1px solid var(--line);background:var(--card);border-radius:4px;padding:4px 8px;cursor:pointer;color:var(--ink-soft);}
  .word-row .wactions button:hover{background:var(--paper-dark);}
  .word-row .wactions button.del{color:var(--rust);}

  .form-card{
    background:var(--card);
    border:1px solid var(--ink);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:20px;
  }
  .form-row{margin-bottom:12px;}
  .form-row label{
    display:block;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.5px;
    margin-bottom:5px;
  }
  .form-row input[type=text], .form-row textarea, .form-row select{
    width:100%;
    font-family:'Noto Sans TC','Noto Sans KR',sans-serif;
    font-size:15px;
    padding:9px 11px;
    border:1px solid var(--line);
    border-radius:6px;
    background:#FFFFFF;
    color:var(--ink);
    resize:vertical;
  }
  .form-row textarea{min-height:70px;}
  .form-row input:focus, .form-row textarea:focus{outline:2px solid var(--green);outline-offset:0;border-color:var(--green);}

  .img-row{display:flex;align-items:center;gap:12px;}
  .img-preview{
    width:64px;height:64px;border-radius:6px;border:1px solid var(--line);
    background:var(--paper-dark) center/cover no-repeat;
    display:flex;align-items:center;justify-content:center;
    font-size:10px;color:var(--muted);text-align:center;flex-shrink:0;
  }
  .file-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    padding:8px 12px;
    border:1px solid var(--line);
    border-radius:6px;
    background:#FFFFFF;
    color:var(--ink);
    cursor:pointer;
  }
  .file-label:hover{background:var(--green-tint);}
  .clear-img{font-size:11px;color:var(--rust);background:none;border:none;cursor:pointer;font-family:'IBM Plex Mono',monospace;padding:0;}

  .form-actions{display:flex;gap:10px;margin-top:14px;}
  .btn{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    padding:9px 18px;
    border-radius:6px;
    cursor:pointer;
    border:1px solid var(--line);
    background:#FFFFFF;
    color:var(--ink);
  }
  .btn.primary{background:var(--green);border-color:var(--green);color:#FFFFFF;font-weight:600;}
  .btn.primary:hover{background:var(--green-dark);}
  .btn:hover{background:var(--paper-dark);}
  .btn.text{border:none;background:none;color:var(--ink-soft);}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
  .mini{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:12px;
    position:relative;
    cursor:default;
  }
  .mini .thumb{
    width:100%;height:80px;border-radius:6px;
    background:var(--paper-dark) center/cover no-repeat;
    margin-bottom:8px;
    display:flex;align-items:center;justify-content:center;
    color:var(--muted);font-size:11px;
  }
  .mini .front{font-family:'Inter','Noto Sans TC',sans-serif;font-weight:700;font-size:15px;line-height:1.3;margin-bottom:2px;word-break:break-word;}
  .mini .back{font-size:12px;color:var(--ink-soft);line-height:1.4;max-height:36px;overflow:hidden;word-break:break-word;}
  .mini .actions{display:flex;gap:6px;margin-top:8px;}
  .mini .actions button{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    border:1px solid var(--line);
    background:#FFFFFF;
    border-radius:4px;
    padding:4px 8px;
    cursor:pointer;
    color:var(--ink-soft);
  }
  .mini .actions button.del{color:var(--rust);border-color:var(--rust-tint);}
  .mini .actions button:hover{background:var(--paper-dark);}

  .empty{
    text-align:center;
    padding:50px 20px;
    color:var(--muted);
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    border:1px dashed var(--line);
    border-radius:var(--radius);
  }

  /* ---- Study view ---- */
  .study-wrap{display:flex;flex-direction:column;align-items:center;}
  .counter{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);margin-bottom:14px;}
  .stage{perspective:1400px;width:100%;max-width:420px;height:300px;margin-bottom:20px;}
  .card3d{
    position:relative;width:100%;height:100%;
    transform-style:preserve-3d;
    transition:transform 0.5s cubic-bezier(.4,.2,.2,1);
    cursor:pointer;
  }
  .card3d.flipped{transform:rotateY(180deg);}
  .face{
    position:absolute;inset:0;
    backface-visibility:hidden;
    border-radius:14px;
    border:1px solid var(--ink);
    background:var(--card);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;
    text-align:center;
  }
  .face .tag{
    position:absolute;top:12px;left:16px;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;letter-spacing:1px;
    color:var(--muted);text-transform:uppercase;
  }
  .face img{max-width:100%;max-height:120px;border-radius:8px;margin-bottom:14px;object-fit:contain;}
  .face .word{font-family:'Inter','Noto Sans TC','Noto Sans KR',sans-serif;font-weight:900;font-size:26px;line-height:1.3;}
  .face.back{transform:rotateY(180deg);background:var(--green-tint);border-color:var(--green);}
  .face.back .word{font-family:'Noto Sans TC','Noto Sans KR',sans-serif;font-weight:500;font-size:17px;color:var(--green-dark);}
  .hint{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:10px;}

  .controls{display:flex;align-items:center;gap:14px;}
  .icon-btn{
    width:42px;height:42px;border-radius:50%;
    border:1px solid var(--ink);background:var(--card);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:16px;
  }
  .icon-btn:hover{background:var(--paper-dark);}
  .shuffle-btn{
    font-family:'IBM Plex Mono',monospace;font-size:12px;
    border:1px solid var(--ink);background:var(--card);
    border-radius:999px;padding:8px 14px;cursor:pointer;
  }
  .shuffle-btn:hover{background:var(--paper-dark);}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--paper);
    font-family:'IBM Plex Mono',monospace;font-size:12px;
    padding:9px 16px;border-radius:6px;
    opacity:0;pointer-events:none;transition:opacity 0.25s;
    z-index:50;
  }
  .toast.show{opacity:1;}

  @media(max-width:480px){
    .logo-title{height:80px;max-width:60vw;object-fit:contain;}
    .stage{height:260px;}
  }
</style>
</head>

  <!-- Manage panel -->
  <div id="panelManage" class="panel active">

    <!-- Library view: grid of word-collection "albums" -->
    <div id="libraryView">
      <div class="lib-header">
        <div class="lib-header-title">你的單字集</div>
        <div class="lib-header-actions">
        <button class="icon-add-btn" id="openLyricsBtn" aria-label="新增單字集">+</button>
        <button class="icon-add-btn" id="toggleDeleteModeBtn" aria-label="更多選項">⋯</button>
      </div>
      </div>

      <div class="form-card" id="lyricsForm" style="display:none;">
        <div class="form-row">
          <label>專輯名稱</label>
          <input type="text" id="albumNameInput" placeholder="例如：strawberry cake">
        </div>
        <div class="form-row">
          <label>歌手（選填）</label>
          <input type="text" id="albumArtistInput" placeholder="例如：IVE">
        </div>
        <div class="form-row">
          <label>封面圖（選填）</label>
          <div class="img-row">
            <div class="img-preview" id="albumCoverPreview">無圖片</div>
            <label class="file-label" for="albumCoverInput">選擇圖片</label>
            <input type="file" id="albumCoverInput" accept="image/*" style="display:none;">
            <button class="clear-img" id="clearAlbumCoverBtn" style="display:none;">移除圖片</button>
          </div>
        </div>
        <div class="form-row">
          <label>貼上歌詞</label>
          <textarea id="lyricsInput" style="min-height:120px;" placeholder="在這裡貼上一整段歌詞…"></textarea>
        </div>
        <div class="form-row">
          <label>歌詞語言</label>
          <select id="lyricsLangSelect">
            <option value="en">English 英文</option>
            <option value="ja">日本語 日文</option>
            <option value="ko">한국어 韓文</option>
          </select>
        </div>
        <div class="form-actions">
          <button class="btn primary" id="analyzeLyricsBtn">分析歌詞並翻譯</button>
          <button class="btn text" id="cancelLyricsBtn">取消</button>
        </div>
        <div class="lyrics-status" id="lyricsStatus" style="display:none;"></div>
        <div class="form-actions" id="lyricsSelectRow" style="display:none;">
          <button class="btn text" id="selectAllBtn">全選</button>
          <button class="btn text" id="deselectAllBtn">取消全選</button>
        </div>
        <div class="lyrics-list" id="lyricsList"></div>
        <div class="form-actions" id="lyricsConfirmRow" style="display:none;">
          <button class="btn primary" id="addLyricsCardsBtn">建立單字集</button>
          <button class="btn text" id="cancelLyricsReviewBtn">重新輸入</button>
        </div>
      </div>

      <div id="albumGrid" class="lib-grid"></div>
      <input type="file" id="editAlbumCoverInput" accept="image/*" style="display:none;">
      <div id="emptyManage" class="empty" style="display:none;">目前還沒有單字集，點右上角的 + 建立第一個吧。</div>
    </div>

    <!-- Album detail view: words listed line by line -->
    <div id="albumDetailView" style="display:none;">
      <button class="back-btn" id="backToLibraryBtn">‹ 返回單字集</button>
      <div class="album-detail-header">
        <div class="album-cover" id="albumDetailCover"></div>
        <div>
          <div class="album-detail-title" id="albumDetailTitle"></div>
          <div class="album-detail-meta" id="albumDetailMeta"></div>
        </div>
      </div>

      <button class="add-btn" id="openFormBtn" style="margin:16px 0;">+ 新增一個單字</button>
      <div class="form-card" id="formCard" style="display:none;">
        <div class="form-row">
          <label>正面（單字 / 題目）</label>
          <input type="text" id="frontInput" placeholder="例如：ubiquitous">
        </div>
        <div class="form-row">
          <label>背面（意思 / 說明）</label>
          <textarea id="backInput" placeholder="例如：無所不在的，到處存在的"></textarea>
        </div>
        <div class="form-row">
          <label>圖片（選填）</label>
          <div class="img-row">
            <div class="img-preview" id="imgPreview">無圖片</div>
            <label class="file-label" for="imgInput">選擇圖片</label>
            <input type="file" id="imgInput" accept="image/*" style="display:none;">
            <button class="clear-img" id="clearImgBtn" style="display:none;">移除圖片</button>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn primary" id="saveCardBtn">儲存字卡</button>
          <button class="btn text" id="cancelFormBtn">取消</button>
        </div>
      </div>

      <div id="wordList" class="word-list"></div>
      <div id="emptyAlbum" class="empty" style="display:none;">這個單字集還沒有單字。</div>
    </div>
  </div>

  <!-- Study panel -->
  <div id="panelStudy" class="panel">
    <div class="study-wrap">
      <div class="counter" id="counter"></div>
      <div class="stage">
        <div class="card3d" id="card3d">
          <div class="face front">

const hasCloud = !!(window.storage && window.storage.get && window.storage.set);

async function loadCards(){
  try{
    if(hasCloud){
      const r = await window.storage.get(STORAGE_KEY);
      return r && r.value ? JSON.parse(r.value) : [];
    }else{
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    }
  }catch(e){ return []; }
}
async function saveCards(cards){
  try{
    if(hasCloud){
      await window.storage.set(STORAGE_KEY, JSON.stringify(cards));
    }else{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
    }
    return true;
  }catch(e){ return false; }
}
async function loadAlbums(){
  try{
    if(hasCloud){
      const r = await window.storage.get(ALBUMS_KEY);
      return r && r.value ? JSON.parse(r.value) : [];

      const raw = localStorage.getItem(ALBUMS_KEY);
      return raw ? JSON.parse(raw) : [];

}

    if(hasCloud){
      await window.storage.set(ALBUMS_KEY, JSON.stringify(albums));
    }else{
      localStorage.setItem(ALBUMS_KEY, JSON.stringify(albums));

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function resizeImage(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = e =>{
      const img = new Image();
      img.onload = ()=>{
        const maxDim = 640;
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = Math.round(h*maxDim/w); w = maxDim; }
        else if(h > maxDim){ w = Math.round(w*maxDim/h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function makeRowDraggable(row){
  const LONG_PRESS = 400;
  const MOVE_CANCEL = 10;
  let timer = null, dragging = false, startY = 0, pointerId = null;

  row.addEventListener('pointerdown', (e)=>{
    if(e.target.closest('.wactions')) return;
    startY = e.clientY;
    pointerId = e.pointerId;
    timer = setTimeout(()=>{
      dragging = true;
      row.classList.add('dragging');
      try{ row.setPointerCapture(pointerId); }catch(err){}
    }, LONG_PRESS);
  });
  row.addEventListener('pointermove', (e)=>{
    if(!dragging){
      if(Math.abs(e.clientY - startY) > MOVE_CANCEL) clearTimeout(timer);
      return;
    }
    e.preventDefault();
    const siblings = Array.from(wordList.children).filter(el=>el!==row);
    for(const sib of siblings){
      const rect = sib.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      if(e.clientY < mid && sib.previousElementSibling === row){
        wordList.insertBefore(row, sib);
        break;
      }else if(e.clientY > mid && sib.nextElementSibling === row){
        wordList.insertBefore(row, sib.nextSibling);
        break;
      }
    }
  });
  const endDrag = ()=>{
    clearTimeout(timer);
    if(dragging){
      dragging = false;
      row.classList.remove('dragging');
      persistWordOrder();
    }
  };
  row.addEventListener('pointerup', endDrag);
  row.addEventListener('pointercancel', endDrag);
}

const STOPWORDS = {
  en: new Set(['a','an','the','and','or','but','if','so','of','to','in','on','at','by','for','with','from','as','is','are','was','were','be','been','being','it','its','this','that','these','those','i','you','he','she','we','they','me','him','her','us','them','my','your','his','their','our','not','no','do','does','did','doing','done','have','has','had','will','would','can','could','shall','should','may','might','must','up','down','out','over','under','again','then','than','just','too','very','s','t','re','ve','ll','d','m','am','oh','yeah','na','la','uh','ah','ooh','gonna','wanna','gotta','cause']),
  ja: new Set(['の','は','が','を','に','で','と','も','から','まで','より','へ','や','な','だ','です','ます','でした','ました','して','した','する','ない','れる','られる','たり','ば','ので','のに','けど','けれど','しかし','また','そして','という','こと','もの','これ','それ','あれ','この','その','あの','ここ','そこ','あそこ','私','僕','君','あなた','彼','彼女','ん','よ','ね','わ','さ','かな','かも','じゃ','って','ぞ','ぜ']),
  ko: new Set(['은','는','이','가','을','를','의','에','에서','으로','로','와','과','도','만','부터','까지','이나','나','라도','이라도','하고','이랑','랑','다','요','습니다','입니다','했다','한다','있다','없다','나','너','저','우리','그','그녀','이것','저것','그것','것','수','때','등'])
};

const LATIN_LANGS = new Set(['en']);

function tokenizeLyrics(text, lang){
  const stop = STOPWORDS[lang] || STOPWORDS.en;
  const seen = new Set();
  const result = [];

  const pushWord = (clean)=>{
    if(!clean) return;
    if(stop.has(clean)) return;
    if(seen.has(clean)) return;
    const already = cards.some(c=>c.front.trim().toLowerCase() === clean.toLowerCase());
    if(already) return;
    seen.add(clean);
    result.push(clean);
  };

  if(LATIN_LANGS.has(lang)){
    const words = text.toLowerCase().match(/[a-zà-öø-ÿ']+/g) || [];
    for(const w of words){
      const clean = w.replace(/^'+|'+$/g,'');
      if(clean.length < 3) continue;
      pushWord(clean);
      if(result.length >= 40) break;
    }
    return result;
  }

  // Japanese / Korean: use the browser's built-in word segmenter (no external library needed)
  const SCRIPT_TEST = {
    ja: /[\u3040-\u30FF\u4E00-\u9FFF]/,
    ko: /^[\uAC00-\uD7A3\u1100-\u11FF\u3130-\u318F]+$/
  };
  if(typeof Intl !== 'undefined' && Intl.Segmenter){
    try{
      const seg = new Intl.Segmenter(lang, { granularity: 'word' });
      for(const part of seg.segment(text)){
        if(!part.isWordLike) continue;
        const clean = part.segment.trim();
        if(!clean || clean.length < 1) continue;
        if(/^[0-9]+$/.test(clean)) continue;
        const scriptOk = SCRIPT_TEST[lang] ? SCRIPT_TEST[lang].test(clean) : true;
        if(!scriptOk) continue;
        pushWord(clean);
        if(result.length >= 40) break;
      }
      return result;
    }catch(e){ /* fall through to fallback below */ }
  }
  // Fallback if Intl.Segmenter isn't supported: split on punctuation/whitespace only
  const chunks = text.split(/[\s、。！？,.!?\n]+/).filter(Boolean);
  for(const c of chunks){
    pushWord(c);
    if(result.length >= 40) break;
  }
  return result;
}

let lyricsCandidates = [];

const LANG_NAMES = { en:'English', ja:'Japanese', ko:'Korean' };

// Primary: ask Claude to translate the whole word list in one request.
// Only works while this page is opened inside claude.ai (the artifact runtime
// proxies the request); returns null if that's not available so we can fall back.
async function translateBatchWithClaude(words, lang){
  const langName = LANG_NAMES[lang] || lang;
  const prompt = `Translate each of the following ${langName} words to Traditional Chinese (zh-TW), as they would be used in song lyrics. Reply with ONLY a raw JSON object mapping each original word to its Traditional Chinese translation - no markdown fences, no explanation.\n\nWords: ${JSON.stringify(words)}`;
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-5',
        max_tokens: 1500,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if(!res.ok) return null;
    const data = await res.json();
    const text = (data.content || []).map(b=>b.text || '').join('');
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    return (parsed && typeof parsed === 'object') ? parsed : null;
  }catch(e){ return null; }
}

// Fallback: free public translation APIs, word by word (used if the Claude
// call above isn't available, e.g. the file was downloaded and opened outside claude.ai).
async function translateViaGoogle(word, lang){
  try{
    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${lang}&tl=zh-TW&dt=t&q=${encodeURIComponent(word)}`);
    if(!res.ok) return '';
    const data = await res.json();
    if(data && data[0] && data[0][0] && data[0][0][0]) return data[0][0][0];
    return '';
  }catch(e){ return ''; }
}

async function translateViaMyMemory(word, lang){
  try{
    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=${lang}|zh-TW`);
    const data = await res.json();
    const t = data && data.responseData ? data.responseData.translatedText : '';
    if(!t || /no query|invalid|warning/i.test(t)) return '';
    return t;
  }catch(e){ return ''; }
}

async function translateAllWords(words, lang, onProgress){
  const claudeResult = await translateBatchWithClaude(words, lang);
  if(claudeResult){
    words.forEach(w=>onProgress(w, claudeResult[w] || ''));
    return;
  }
  for(const w of words){
    let t = await translateViaGoogle(w, lang);
    if(!t) t = await translateViaMyMemory(w, lang);
    onProgress(w, t);
    await new Promise(r=>setTimeout(r, 200));
  }
}

openLyricsBtn.addEventListener('click', ()=>{
  lyricsForm.style.display = 'block';
  openLyricsBtn.style.display = 'none';
});
function closeLyricsForm(){
  lyricsForm.style.display = 'none';
  openLyricsBtn.style.display = 'flex';
  lyricsList.innerHTML = '';
  lyricsSelectRow.style.display = 'none';
  lyricsConfirmRow.style.display = 'none';
  lyricsStatus.style.display = 'none';
  albumNameInput.value = '';
  albumArtistInput.value = '';
  pendingAlbumCover = null;
  albumCoverInput.value = '';
  albumCoverPreview.style.backgroundImage = '';
  albumCoverPreview.textContent = '無圖片';
  clearAlbumCoverBtn.style.display = 'none';
  lyricsInput.value = '';
  lyricsCandidates = [];
}
document.getElementById('cancelLyricsBtn').addEventListener('click', closeLyricsForm);
document.getElementById('cancelLyricsReviewBtn').addEventListener('click', closeLyricsForm);

document.getElementById('analyzeLyricsBtn').addEventListener('click', async ()=>{
  const albumName = albumNameInput.value.trim();
  const text = lyricsInput.value.trim();
  const lang = lyricsLangSelect.value;
  if(!albumName){ showToast('請先輸入專輯名稱'); albumNameInput.focus(); return; }
  if(!text){ showToast('請先貼上歌詞'); return; }
  const words = tokenizeLyrics(text, lang);
  if(!words.length){ showToast('沒有找到可用的新單字'); return; }
  lyricsList.innerHTML = '';
  lyricsCandidates = words.map(w=>({ word:w, translation:'' }));
  lyricsStatus.style.display = 'block';
  lyricsStatus.textContent = `找到 ${words.length} 個單字，翻譯中… 0/${words.length}`;
  words.forEach(w=>{
    const row = document.createElement('div');
    row.className = 'lyrics-item';
    row.innerHTML = `<input type="checkbox" checked data-word="${w}"><span class="lw">${w}</span><span class="lt pending" id="lt-${w}">翻譯中…</span>`;
    lyricsList.appendChild(row);
  });
  let done = 0;
  await translateAllWords(words, lang, (word, translation)=>{
    const item = lyricsCandidates.find(c=>c.word===word);
    if(item) item.translation = translation || '（翻譯失敗，可手動編輯）';
    const el = document.getElementById(`lt-${word}`);
    if(el){ el.textContent = item ? item.translation : ''; el.classList.remove('pending'); }
    done++;
    lyricsStatus.textContent = `找到 ${words.length} 個單字，翻譯中… ${done}/${words.length}`;
  });
  lyricsStatus.textContent = `完成！取消勾選你不需要的單字，再按下方加入。`;
  lyricsSelectRow.style.display = 'flex';
  lyricsConfirmRow.style.display = 'flex';
});

document.getElementById('addLyricsCardsBtn').addEventListener('click', async ()=>{
  const checked = Array.from(lyricsList.querySelectorAll('input[type=checkbox]:checked')).map(cb=>cb.dataset.word);
  if(!checked.length){ showToast('沒有選取任何單字'); return; }
  const newAlbum = {
    id: uid(),
    name: albumNameInput.value.trim(),
    artist: albumArtistInput.value.trim(),
    coverImage: pendingAlbumCover,
    createdAt: Date.now()
  };
  albums.push(newAlbum);
  await saveAlbums(albums);
  let added = 0;
  checked.forEach(w=>{
    const c = lyricsCandidates.find(x=>x.word===w);
    if(!c) return;
    cards.push({ id: uid(), front: c.word, back: c.translation, image: null, albumId: newAlbum.id, createdAt: Date.now() });
    added++;
  });
  await saveCards(cards);
  closeLyricsForm();
  showToast(`已建立單字集「${newAlbum.name}」，加入 ${added} 個單字`);
  openAlbum(newAlbum.id);
});

/* ---- Init ---- */
(async function init(){
  cards = await loadCards();
  albums = await loadAlbums();
  const validAlbumIds = new Set(albums.map(a=>a.id));
  const cleaned = cards.filter(c => c.albumId && validAlbumIds.has(c.albumId));
  if(cleaned.length !== cards.length){
    cards = cleaned;
    await saveCards(cards);
  }
  render();
})();
</script>
